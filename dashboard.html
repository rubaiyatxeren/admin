        if (btn) {
          btn.disabled = true;
          btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Running...';
        }

        // Show progress
        const progressCard = document.getElementById("ltProgressCard");
        if (progressCard) progressCard.style.display = "";
        setLtProgress(0, "Starting test...");

        const startTime = Date.now();
        let timerInterval = setInterval(() => {
          const el = document.getElementById("ltTimer");
          if (el)
            el.textContent = ((Date.now() - startTime) / 1000).toFixed(1) + "s";
        }, 100);

        try {
          setLtProgress(20, "Sending request to backend...");

          const res = await apiCall("/orders/load-test", {
            method: "POST",
            body: JSON.stringify({ count, sendEmails }),
          });

          setLtProgress(100, "Complete!");
          clearInterval(timerInterval);

          const elapsed = ((Date.now() - startTime) / 1000).toFixed(2);
          const summary = res.summary || {};

          // Render results
          document.getElementById("ltResults").innerHTML = `
            <div class="card fade-up" style="border-color:${summary.failed > 0 ? "var(--amber)" : "var(--lime)"}">
              <div style="display:flex;align-items:center;gap:12px;margin-bottom:20px">
                <div style="width:48px;height:48px;border-radius:14px;background:${summary.failed > 0 ? "rgba(245,166,35,.15)" : "rgba(198,241,53,.15)"};display:flex;align-items:center;justify-content:center;font-size:22px">
                  ${summary.failed > 0 ? "⚠️" : "✅"}
                </div>
                <div>
                  <div class="card-title">Test Complete</div>
                  <div class="card-sub">${elapsed}s total · ${summary.rate || "N/A"}</div>
                </div>
              </div>

              <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px">
                <div style="background:var(--bg);border-radius:12px;padding:16px;text-align:center">
                  <div style="font-family:'Syne',sans-serif;font-size:28px;font-weight:800;color:var(--lime)">${summary.created || 0}</div>
                  <div style="font-size:11px;color:var(--text3);margin-top:4px">Created</div>
                </div>
                <div style="background:var(--bg);border-radius:12px;padding:16px;text-align:center">
                  <div style="font-family:'Syne',sans-serif;font-size:28px;font-weight:800;color:var(--rose)">${summary.failed || 0}</div>
                  <div style="font-size:11px;color:var(--text3);margin-top:4px">Failed</div>
                </div>
                <div style="background:var(--bg);border-radius:12px;padding:16px;text-align:center">
                  <div style="font-family:'Syne',sans-serif;font-size:28px;font-weight:800;color:var(--sky)">${elapsed}s</div>
                  <div style="font-size:11px;color:var(--text3);margin-top:4px">Duration</div>
                </div>
                <div style="background:var(--bg);border-radius:12px;padding:16px;text-align:center">
                  <div style="font-family:'Syne',sans-serif;font-size:22px;font-weight:800;color:var(--amber)">${summary.rate || "—"}</div>
                  <div style="font-size:11px;color:var(--text3);margin-top:4px">Throughput</div>
                </div>
              </div>

              ${
                res.errors?.length
                  ? `
                <div style="background:rgba(244,63,94,.08);border:1px solid rgba(244,63,94,.2);border-radius:10px;padding:14px;margin-bottom:16px">
                  <div style="font-size:12px;font-weight:700;color:var(--rose);margin-bottom:8px"><i class="fas fa-circle-exclamation"></i> Errors (${res.errors.length})</div>
                  ${res.errors.map((e) => `<div style="font-size:11px;color:var(--text3);font-family:monospace;padding:2px 0">${e}</div>`).join("")}
                </div>`
                  : ""
              }

              <div style="display:flex;gap:10px">
                <button class="btn btn-primary btn-sm" onclick="loadPage('orders')">
                  <i class="fas fa-eye"></i> View Orders
                </button>
                <button class="btn btn-ghost btn-sm" onclick="runLoadTest(${count})">
                  <i class="fas fa-redo"></i> Run Again
                </button>
                <button class="btn btn-danger btn-sm" onclick="confirmCleanup()" style="margin-left:auto">
                  <i class="fas fa-trash"></i> Cleanup Test Data
                </button>
              </div>
            </div>`;

          // Save to history
          window._ltHistory = window._ltHistory || [];
          window._ltHistory.unshift({
            time: new Date().toLocaleTimeString(),
            count,
            created: summary.created || 0,
            failed: summary.failed || 0,
            elapsed,
            rate: summary.rate || "—",
          });
          if (window._ltHistory.length > 10) window._ltHistory.pop();
          renderLtHistory();

          showToast(
            `✅ ${summary.created} orders created in ${elapsed}s`,
            "success",
          );
        } catch (err) {
          clearInterval(timerInterval);
          setLtProgress(0, "Failed");
          if (progressCard) progressCard.style.display = "none";
          document.getElementById("ltResults").innerHTML = `
            <div class="card" style="border-color:var(--rose)">
              <div style="display:flex;align-items:center;gap:12px">
                <div style="font-size:32px">❌</div>
                <div>
                  <div class="card-title" style="color:var(--rose)">Test Failed</div>
                  <div class="card-sub">${err.message}</div>
                </div>
              </div>
              <div style="margin-top:16px;padding:12px;background:var(--bg);border-radius:10px;font-size:12px;font-family:monospace;color:var(--text3)">
                ${err.message}
              </div>
              <div style="margin-top:12px">
                <button class="btn btn-ghost btn-sm" onclick="loadPage('testing')">
                  <i class="fas fa-rotate-right"></i> Reset
                </button>
              </div>
            </div>`;
          showToast(err.message, "error");
        } finally {
          if (btn) {
            btn.disabled = false;
            btn.innerHTML = '<i class="fas fa-play"></i> Run Load Test';
          }
          if (progressCard)
            setTimeout(() => {
              if (progressCard) progressCard.style.display = "none";
            }, 2000);
        }
      }

      async function loadDeliveryCharges() {
        const container = document.getElementById("deliveryChargesList");
        if (!container) return;

        try {
          // ✅ FIX: Use the correct endpoint (already using /delivery-charges)
          const res = await apiCall("/delivery-charges");
          const charges = res.data || [];

          if (charges.length === 0) {
            container.innerHTML = `
              <div style="text-align: center; padding: 40px; color: var(--text3);">
                <i class="fas fa-truck" style="font-size: 40px; margin-bottom: 12px; display: block;"></i>
                No delivery charges configured. Add your first charge.
              </div>
            `;
            return;
          }

          container.innerHTML = charges
            .map(
              (charge) => `
            <div style="display: flex; align-items: center; justify-content: space-between; padding: 12px; background: var(--bg); border-radius: 12px; margin-bottom: 8px; border: 1px solid var(--border);">
              <div style="flex: 1;">
                <div style="display: flex; align-items: center; gap: 12px; flex-wrap: wrap;">
                  <span style="font-weight: 600; font-size: 14px;">${charge.name === "inside_dhaka" ? "🏙️ Inside Dhaka" : charge.name === "outside_dhaka" ? "🚚 Outside Dhaka" : "📦 Default"}</span>
                  <span class="badge ${charge.isActive ? "badge-lime" : "badge-rose"}">${charge.isActive ? "Active" : "Inactive"}</span>
                  <span style="font-family: 'Syne', monospace; font-size: 18px; font-weight: 700; color: var(--lime);">৳${charge.amount}</span>
                  ${charge.minOrderAmount > 0 ? `<span class="badge badge-amber">Min: ৳${charge.minOrderAmount}</span>` : ""}
                </div>
              </div>
              <div style="display: flex; gap: 8px;">
                <button class="btn btn-ghost btn-sm" onclick="editDeliveryCharge('${charge._id}')">
                  <i class="fas fa-edit"></i>
                </button>
                <button class="btn btn-danger btn-sm" onclick="deleteDeliveryCharge('${charge._id}')">
                  <i class="fas fa-trash"></i>
                </button>
              </div>
            </div>
          `,
            )
            .join("");
        } catch (error) {
          console.error("Error loading delivery charges:", error);
          showToast("Failed to load delivery charges", "error");
          container.innerHTML = `
            <div style="text-align: center; padding: 40px; color: var(--text3);">
              <i class="fas fa-truck" style="font-size: 40px; margin-bottom: 12px; display: block;"></i>
              Delivery charges API not available yet.<br>
              <span style="font-size: 12px;">Please contact administrator to enable this feature.</span>
            </div>
          `;
        }
      }

      async function openDeliveryChargeModal(id = null) {
        let charge = null;
        if (id) {
          try {
            const res = await apiCall("/delivery-charges");
            charge = res.data.find((c) => c._id === id);
          } catch (e) {
            console.error("Error fetching charge:", e);
          }
        }

        modal(`
          <div class="modal-box">
            <div class="modal-header">
              <div>
                <div class="modal-title">${id ? "Edit" : "Add"} Delivery Charge</div>
                <div class="modal-sub">Configure delivery fees for different zones</div>
              </div>
              <button class="modal-close" onclick="closeModal()"><i class="fas fa-times"></i></button>
            </div>
            <form id="deliveryChargeForm">
              <div class="modal-body">
                <div class="form-group">
                  <label class="form-label">Zone Name</label>
                  ${
                    id
                      ? `
                    <input type="text" class="inp" value="${charge?.name === "inside_dhaka" ? "🏙️ Inside Dhaka" : charge?.name === "outside_dhaka" ? "🚚 Outside Dhaka" : "📦 Default"}" disabled>
                    <input type="hidden" name="name" value="${charge?.name}">
                  `
                      : `
                    <select class="inp" name="name" required>
                      <option value="inside_dhaka">Inside Dhaka</option>
                      <option value="outside_dhaka">Outside Dhaka</option>
                      <option value="default">Default (Fallback)</option>
                    </select>
                  `
                  }
                  <div style="font-size: 11px; color: var(--text3); margin-top: 4px;">
                    Inside Dhaka: For customers in Dhaka city<br>
                    Outside Dhaka: For customers outside Dhaka<br>
                    Default: Used when no other charge applies
                  </div>
                </div>

                <div class="form-group">
                  <label class="form-label">Delivery Charge (৳)</label>
                  <input class="inp" name="amount" type="number" step="1" required value="${charge?.amount || 60}">
                </div>

                <div class="form-group">
                  <label class="form-label">Minimum Order Amount (Optional)</label>
                  <input class="inp" name="minOrderAmount" type="number" step="1" placeholder="0 = always applicable" value="${charge?.minOrderAmount || 0}">
                  <div style="font-size: 11px; color: var(--text3); margin-top: 4px;">
                    Only apply this charge when order total is above this amount
                  </div>
                </div>

                <label style="display: flex; align-items: center; gap: 10px; cursor: pointer; margin-top: 12px;">
                  <label class="toggle">
                    <input type="checkbox" name="isActive" value="true" ${charge?.isActive !== false ? "checked" : ""}>
                    <span class="toggle-slider"></span>
                  </label>
                  <span style="font-size: 13px; font-weight: 500;">Active</span>
                </label>
              </div>
              <div class="modal-footer">
                <button type="button" class="btn btn-ghost" onclick="closeModal()">Cancel</button>
                <button type="submit" class="btn btn-primary">Save Delivery Charge</button>
              </div>
            </form>
          </div>
        `);
      }

      document.getElementById("deliveryChargeForm").onsubmit = async (e) => {
        e.preventDefault();
        const formData = new FormData(e.target);
        const data = {
          name: formData.get("name"),
          amount: parseInt(formData.get("amount")),
          minOrderAmount: parseInt(formData.get("minOrderAmount")) || 0,
          isActive: e.target.isActive?.checked || false,
        };

        try {
          // ✅ Fixed: Remove leading slash
          await apiCall("/delivery-charges", {
            method: "POST",
            body: JSON.stringify(data),
          });
          showToast("Delivery charge saved successfully!", "success");
          closeModal();
          loadDeliveryCharges();
        } catch (err) {
          console.error("Error saving delivery charge:", err);
          showToast(err.message || "Failed to save delivery charge", "error");
        }
      };

      async function editDeliveryCharge(id) {
        openDeliveryChargeModal(id);
      }

      async function deleteDeliveryCharge(id) {
        if (!confirm("Delete this delivery charge?")) return;
        try {
          // ✅ Fixed: Remove leading slash
          await apiCall(`/delivery-charges/${id}`, { method: "DELETE" });
          showToast("Delivery charge deleted", "success");
          loadDeliveryCharges();
        } catch (err) {
          console.error("Error deleting delivery charge:", err);
          showToast(err.message || "Failed to delete delivery charge", "error");
        }
      }

      function setLtProgress(pct, label) {
        const bar = document.getElementById("ltProgressBar");
        const lbl = document.getElementById("ltProgressLabel");
        const pctEl = document.getElementById("ltProgressPct");
        if (bar) bar.style.width = pct + "%";
        if (lbl) lbl.textContent = label;
        if (pctEl) pctEl.textContent = pct + "%";
      }

      function renderLtHistory() {
        const el = document.getElementById("ltHistory");
        if (!el) return;
        const h = window._ltHistory || [];
        if (!h.length) return;
        el.innerHTML = h
          .map(
            (r) => `
          <div style="display:flex;align-items:center;gap:12px;padding:10px 14px;background:var(--bg);border-radius:10px;border:1px solid var(--border)">
            <div style="font-size:12px;color:var(--text3);width:60px">${r.time}</div>
            <div style="flex:1">
              <span style="font-size:13px;font-weight:600">${r.count} orders requested</span>
              <span style="font-size:11px;color:var(--text3);margin-left:8px">${r.elapsed}s · ${r.rate}</span>
            </div>
            <span class="badge badge-lime">${r.created} created</span>
            ${r.failed > 0 ? `<span class="badge badge-rose">${r.failed} failed</span>` : ""}
          </div>`,
          )
          .join("");
      }

      async function confirmCleanup() {
        if (
          !confirm(
            "Delete ALL test orders? (emails ending in @loadtest.com)\n\nThis cannot be undone.",
          )
        )
          return;
        try {
          // We call a cleanup endpoint — add this to your backend or use the filter
          const res = await apiCall("/orders/load-test/cleanup", {
            method: "DELETE",
          });
          showToast(`🧹 Cleaned up ${res.deleted || 0} test orders`, "success");
          loadPage("testing");
        } catch (err) {
          // Fallback message if endpoint doesn't exist yet
          showToast(
            "Add DELETE /api/orders/load-test/cleanup to backend first",
            "warning",
          );
        }
      }
      // ═══════════════════════════════════════════
      // INIT
      // ═══════════════════════════════════════════
      if (!token) {
        location.href = "index.html";
      } else {
        const admin = JSON.parse(localStorage.getItem("adminData") || "{}");
        const name = admin.name || "Admin";
        document.getElementById("adminName").textContent = name;
        document.getElementById("adminEmail").textContent =
          admin.email || "admin@beeyondharvest.com";
        document.getElementById("sbInitials").textContent = name
          .split(" ")
          .map((w) => w[0])
          .join("")
          .toUpperCase()
          .slice(0, 2);
        loadPage("dashboard");
      }
    </script>
  </body>
</html>
