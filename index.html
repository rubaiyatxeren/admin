<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Login - Beeyond Harvest</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
      rel="stylesheet"
    />
    <style>
      .gradient-bg {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      }
      .toast {
        position: fixed;
        bottom: 20px;
        right: 20px;
        padding: 12px 24px;
        border-radius: 8px;
        color: white;
        z-index: 1000;
        animation: slideIn 0.3s ease-out;
      }
      @keyframes slideIn {
        from {
          transform: translateX(100%);
          opacity: 0;
        }
        to {
          transform: translateX(0);
          opacity: 1;
        }
      }
    </style>
  </head>
  <body class="gradient-bg min-h-screen">
    <div
      class="container mx-auto px-4 min-h-screen flex items-center justify-center"
    >
      <div class="max-w-md w-full bg-white rounded-2xl shadow-2xl p-8">
        <div class="text-center mb-8">
          <div
            class="w-20 h-20 bg-gradient-to-r from-purple-500 to-indigo-600 rounded-full flex items-center justify-center mx-auto mb-4"
          >
            <i class="fas fa-seedling text-white text-3xl"></i>
          </div>
          <h1 class="text-3xl font-bold text-gray-800">Beeyond Harvest</h1>
          <p class="text-gray-600 mt-2">Admin Dashboard Login</p>
        </div>
        <form id="loginForm" class="space-y-6">
          <div>
            <label class="block text-gray-700 font-semibold mb-2"
              >Email Address</label
            >
            <input
              type="email"
              id="email"
              required
              class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500 focus:border-transparent"
              placeholder="admin@beeyondharvestbd.com"
            />
          </div>
          <div>
            <label class="block text-gray-700 font-semibold mb-2"
              >Password</label
            >
            <input
              type="password"
              id="password"
              required
              class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500 focus:border-transparent"
              placeholder="Enter password"
            />
          </div>
          <button
            type="submit"
            class="w-full gradient-bg text-white font-bold py-3 rounded-lg hover:shadow-lg transition-all"
          >
            Sign In
          </button>
        </form>
        <div class="mt-6 text-center text-sm text-gray-500">
          <p>Demo: admin@beeyondharvestbd.com</p>
          <p>Password: Admin@123456beeyondharvest</p>
        </div>
      </div>
    </div>
    <script>
      const API_BASE_URL = "http://localhost:5000/api";

      function showToast(message, type = "success") {
        const toast = document.createElement("div");
        toast.className = `toast ${type === "success" ? "bg-green-500" : "bg-red-500"}`;
        toast.innerHTML = message;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
      }

      document
        .getElementById("loginForm")
        .addEventListener("submit", async (e) => {
          e.preventDefault();
          const email = document.getElementById("email").value;
          const password = document.getElementById("password").value;
          const btn = e.target.querySelector("button");
          const originalText = btn.innerHTML;

          btn.innerHTML =
            '<i class="fas fa-spinner fa-spin mr-2"></i>Logging in...';
          btn.disabled = true;

          try {
            const response = await fetch(`${API_BASE_URL}/auth/login`, {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ email, password }),
            });
            const data = await response.json();

            if (response.ok && data.success) {
              localStorage.setItem("adminToken", data.data.token);
              localStorage.setItem("adminData", JSON.stringify(data.data));
              showToast("Login successful! Redirecting...");
              setTimeout(() => {
                window.location.href = "dashboard.html";
              }, 1000);
            } else {
              throw new Error(data.message || "Invalid credentials");
            }
          } catch (error) {
            showToast(error.message, "error");
          } finally {
            btn.innerHTML = originalText;
            btn.disabled = false;
          }
        });

      if (localStorage.getItem("adminToken")) {
        window.location.href = "dashboard.html";
      }
    </script>
  </body>
</html>
