<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Stock Alerts - Beeyond Harvest</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: "DM Sans", sans-serif;
        background: #0b0d0f;
        color: #e8ecef;
        padding: 24px;
      }
      .container {
        max-width: 1400px;
        margin: 0 auto;
      }
      .header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 28px;
        flex-wrap: wrap;
        gap: 16px;
      }
      .header h1 {
        font-family: "Syne", sans-serif;
        font-size: 28px;
        font-weight: 800;
        display: flex;
        align-items: center;
        gap: 12px;
      }
      .back-btn {
        background: #1e2328;
        border: 1px solid rgba(255, 255, 255, 0.07);
        color: #8f9baa;
        padding: 10px 18px;
        border-radius: 12px;
        cursor: pointer;
        display: inline-flex;
        align-items: center;
        gap: 8px;
        text-decoration: none;
      }
      .back-btn:hover {
        background: #252b31;
        color: #e8ecef;
      }

      .alert-badge {
        background: #f43f5e;
        color: white;
        padding: 4px 12px;
        border-radius: 20px;
        font-size: 12px;
        font-weight: 600;
      }

      .stats-grid {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 20px;
        margin-bottom: 28px;
      }
      .stat-card {
        background: #1e2328;
        border: 1px solid rgba(255, 255, 255, 0.07);
        border-radius: 20px;
        padding: 20px;
      }
      .stat-value {
        font-family: "Syne", sans-serif;
        font-size: 32px;
        font-weight: 800;
        color: #c6f135;
      }
      .stat-label {
        font-size: 12px;
        color: #8f9baa;
        margin-top: 6px;
      }

      .products-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
        gap: 16px;
        margin-top: 20px;
      }
      .product-alert-card {
        background: #1e2328;
        border: 1px solid rgba(255, 255, 255, 0.07);
        border-radius: 16px;
        padding: 18px;
        transition: all 0.2s;
      }
      .product-alert-card.critical {
        border-left: 4px solid #f43f5e;
      }
      .product-alert-card.warning {
        border-left: 4px solid #f5a623;
      }
      .product-alert-card:hover {
        transform: translateY(-2px);
        background: #252b31;
      }

      .product-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
      }
      .product-name {
        font-size: 16px;
        font-weight: 700;
      }
      .product-sku {
        font-size: 11px;
        color: #5a6472;
      }
      .stock-info {
        display: flex;
        justify-content: space-between;
        margin: 12px 0;
      }
      .stock-number {
        font-size: 24px;
        font-weight: 800;
      }
      .stock-number.critical {
        color: #f43f5e;
      }
      .stock-number.warning {
        color: #f5a623;
      }

      .progress-bar {
        background: #0b0d0f;
        border-radius: 10px;
        height: 8px;
        overflow: hidden;
        margin: 12px 0;
      }
      .progress-fill {
        height: 100%;
        border-radius: 10px;
        transition: width 0.3s;
      }
      .progress-fill.critical {
        background: #f43f5e;
      }
      .progress-fill.warning {
        background: #f5a623;
      }
      .progress-fill.good {
        background: #c6f135;
      }

      .btn-order {
        background: #c6f135;
        color: #0b0d0f;
        border: none;
        padding: 10px 16px;
        border-radius: 10px;
        font-weight: 600;
        cursor: pointer;
        width: 100%;
        margin-top: 12px;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
      }
      .btn-order:hover {
        background: #d4f558;
        transform: translateY(-1px);
      }

      .toast-container {
        position: fixed;
        bottom: 24px;
        right: 24px;
        z-index: 1000;
      }
      .toast {
        background: #252b31;
        border: 1px solid rgba(255, 255, 255, 0.07);
        border-radius: 12px;
        padding: 12px 16px;
        margin-top: 8px;
        animation: slideIn 0.3s ease;
      }
      @keyframes slideIn {
        from {
          opacity: 0;
          transform: translateX(20px);
        }
        to {
          opacity: 1;
          transform: translateX(0);
        }
      }

      @media (max-width: 768px) {
        .stats-grid {
          grid-template-columns: repeat(2, 1fr);
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="header">
        <div style="display: flex; align-items: center; gap: 20px">
          <button
            class="back-btn"
            onclick="window.location.href = 'index.html'"
          >
            <i class="fas fa-arrow-left"></i> Back
          </button>
          <h1><i class="fas fa-exclamation-triangle"></i> Stock Alerts</h1>
        </div>
        <div class="alert-badge" id="criticalCount">0 Critical</div>
      </div>

      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-value" id="totalProducts">0</div>
          <div class="stat-label">Total Products</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="criticalStock">0</div>
          <div class="stat-label">Critical Stock (≤5)</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="lowStock">0</div>
          <div class="stat-label">Low Stock (≤10)</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="outOfStock">0</div>
          <div class="stat-label">Out of Stock</div>
        </div>
      </div>

      <div id="productsList" class="products-grid">
        <div style="text-align: center; padding: 60px">Loading products...</div>
      </div>
    </div>
    <div id="toastContainer" class="toast-container"></div>

    <script>
      const API_URL = "https://beeyond-harvest-admin.onrender.com/api";
      let token = localStorage.getItem("adminToken");

      function showToast(msg, type = "success") {
        const container = document.getElementById("toastContainer");
        const toast = document.createElement("div");
        toast.className = "toast";
        toast.innerHTML = `${type === "success" ? "✅" : "⚠️"} ${msg}`;
        container.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
      }

      async function apiCall(endpoint, opts = {}) {
        const headers = { "Content-Type": "application/json" };
        if (token) headers["Authorization"] = `Bearer ${token}`;
        const res = await fetch(`${API_URL}${endpoint}`, { ...opts, headers });
        if (res.status === 401) {
          localStorage.clear();
          window.location.href = "index.html";
        }
        return res.json();
      }

      async function loadStockAlerts() {
        try {
          const res = await apiCall("/products?limit=500");
          let products = res.data || [];

          const critical = products.filter((p) => p.stock > 0 && p.stock <= 5);
          const low = products.filter((p) => p.stock > 5 && p.stock <= 10);
          const out = products.filter((p) => p.stock === 0);

          document.getElementById("totalProducts").textContent =
            products.length;
          document.getElementById("criticalStock").textContent =
            critical.length;
          document.getElementById("lowStock").textContent = low.length;
          document.getElementById("outOfStock").textContent = out.length;
          document.getElementById("criticalCount").textContent =
            `${critical.length} Critical`;

          const sorted = [
            ...critical,
            ...low,
            ...out,
            ...products.filter((p) => p.stock > 10),
          ];
          const container = document.getElementById("productsList");

          container.innerHTML = sorted
            .map((p) => {
              let status = "good";
              let statusClass = "";
              let percent = Math.min((p.stock / 50) * 100, 100);

              if (p.stock === 0) {
                status = "critical";
                statusClass = "critical";
              } else if (p.stock <= 5) {
                status = "critical";
                statusClass = "critical";
              } else if (p.stock <= 10) {
                status = "warning";
                statusClass = "warning";
              }

              return `
                        <div class="product-alert-card ${status === "critical" ? "critical" : status === "warning" ? "warning" : ""}">
                            <div class="product-header">
                                <div>
                                    <div class="product-name">${p.name}</div>
                                    <div class="product-sku">SKU: ${p.sku}</div>
                                </div>
                                ${
                                  p.stock === 0
                                    ? '<i class="fas fa-times-circle" style="color:#f43f5e; font-size:24px;"></i>'
                                    : p.stock <= 5
                                      ? '<i class="fas fa-exclamation-triangle" style="color:#f43f5e; font-size:24px;"></i>'
                                      : p.stock <= 10
                                        ? '<i class="fas fa-clock" style="color:#f5a623; font-size:24px;"></i>'
                                        : '<i class="fas fa-check-circle" style="color:#c6f135; font-size:24px;"></i>'
                                }
                            </div>
                            
                            <div class="stock-info">
                                <span>Current Stock</span>
                                <span class="stock-number ${statusClass}">${p.stock} units</span>
                            </div>
                            
                            <div class="progress-bar">
                                <div class="progress-fill ${statusClass}" style="width: ${percent}%"></div>
                            </div>
                            
                            ${
                              p.stock <= 10
                                ? `
                                <button class="btn-order" onclick="quickReorder('${p._id}', '${p.name}', ${p.stock})">
                                    <i class="fas fa-truck"></i> Quick Reorder (Min: 50 units)
                                </button>
                            `
                                : ""
                            }
                        </div>
                    `;
            })
            .join("");
        } catch (e) {
          showToast("Error loading products", "error");
        }
      }

      window.quickReorder = async function (
        productId,
        productName,
        currentStock,
      ) {
        if (
          !confirm(
            `Order 50 units of "${productName}"? Current stock: ${currentStock}`,
          )
        )
          return;

        try {
          showToast(`Reorder request sent for ${productName}`, "success");
          // In production, this would call an API to create a purchase order
          await apiCall(`/products/${productId}`, {
            method: "PUT",
            body: JSON.stringify({ stock: currentStock + 50 }),
          });
          showToast(`Stock updated! +50 units added`, "success");
          loadStockAlerts();
        } catch (e) {
          showToast("Reorder failed", "error");
        }
      };

      if (!token) window.location.href = "index.html";
      else loadStockAlerts();
    </script>
  </body>
</html>
